<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tüm Ürünler — Butik Moda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/products.css">
</head>
<body>
  <div id="header-slot"></div>

  <main>
    <div class="container">
      <nav class="breadcrumb">
        <a href="index.html">Ana Sayfa</a>
        <span class="sep">/</span>
        <span>Ürünler</span>
      </nav>

      <div class="products-header">
        <div class="products-title">
          <h1>Tüm Koleksiyon</h1>
          <p>Özenle seçilmiş parçaları keşfedin</p>
        </div>
        <button class="mobile-filter-toggle" id="mobile-filter-toggle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
          Filtreler
        </button>
      </div>

      <div class="products-layout">
        <!-- FİLTRELER -->
        <aside class="filters">
          <button class="filters-close icon-btn" aria-label="Kapat">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>

          <div class="filter-group">
            <div class="filter-title">Kategori</div>
            <div class="filter-checklist" id="filter-categories"></div>
          </div>

          <div class="filter-group">
            <div class="filter-title">Beden</div>
            <div class="size-list" id="filter-sizes"></div>
          </div>

          <div class="filter-group">
            <div class="filter-title">Renk</div>
            <div class="color-list" id="filter-colors"></div>
          </div>

          <div class="filter-group">
            <div class="filter-title">Fiyat Aralığı <small>₺</small></div>
            <div class="price-range">
              <div class="price-inputs">
                <input type="number" id="min-price" placeholder="Min" min="0">
                <span>—</span>
                <input type="number" id="max-price" placeholder="Max" min="0">
              </div>
            </div>
          </div>

          <button class="clear-filters" id="clear-filters">Filtreleri Temizle</button>
        </aside>

        <!-- ÜRÜNLER -->
        <div>
          <div class="products-toolbar">
            <div class="search-box">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="search" id="search-input" placeholder="Ürün ara...">
            </div>
            <div style="display:flex; align-items:center; gap:1rem; flex-wrap:wrap;">
              <span class="result-count" id="result-count">0 ürün</span>
              <div class="sort-box">
                <label for="sort-select">Sırala:</label>
                <select id="sort-select">
                  <option value="default">Varsayılan</option>
                  <option value="newest">Yeni Gelenler</option>
                  <option value="price-asc">Fiyat (Artan)</option>
                  <option value="price-desc">Fiyat (Azalan)</option>
                  <option value="name-asc">İsim (A-Z)</option>
                </select>
              </div>
            </div>
          </div>

          <div class="product-grid" id="products-grid"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="footer-slot"></div>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script src="js/products.js"></script>
</body>
</html>
