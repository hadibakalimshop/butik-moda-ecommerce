<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ödeme — Butik Moda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/cart.css">
</head>
<body>
  <div id="header-slot"></div>

  <main>
    <div class="container cart-page">
      <nav class="breadcrumb">
        <a href="index.html">Ana Sayfa</a>
        <span class="sep">/</span>
        <a href="cart.html">Sepetim</a>
        <span class="sep">/</span>
        <span>Ödeme</span>
      </nav>

      <h1 class="page-title">Ödeme</h1>
      <p class="page-subtitle">Siparişinizi tamamlamak üzeresiniz</p>

      <div class="checkout-layout">
        <form class="checkout-form" id="checkout-form" novalidate>
          <div class="form-section">
            <h3>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Kişisel Bilgiler
            </h3>
            <div class="form-grid">
              <div class="form-field full">
                <label>Ad Soyad <span class="req">*</span></label>
                <input type="text" id="fullName" name="fullName" autocomplete="name">
                <span class="error-msg" id="err-fullName"></span>
              </div>
              <div class="form-field">
                <label>E-posta <span class="req">*</span></label>
                <input type="email" id="email" name="email" autocomplete="email">
                <span class="error-msg" id="err-email"></span>
              </div>
              <div class="form-field">
                <label>Telefon <span class="req">*</span></label>
                <input type="tel" id="phone" name="phone" placeholder="05__ ___ __ __" autocomplete="tel">
                <span class="error-msg" id="err-phone"></span>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              Teslimat Adresi
            </h3>
            <div class="form-grid">
              <div class="form-field full">
                <label>Adres <span class="req">*</span></label>
                <textarea id="address" name="address" rows="3" autocomplete="street-address"></textarea>
                <span class="error-msg" id="err-address"></span>
              </div>
              <div class="form-field">
                <label>Şehir <span class="req">*</span></label>
                <input type="text" id="city" name="city" autocomplete="address-level2">
                <span class="error-msg" id="err-city"></span>
              </div>
              <div class="form-field">
                <label>Posta Kodu <span class="req">*</span></label>
                <input type="text" id="zip" name="zip" inputmode="numeric" autocomplete="postal-code">
                <span class="error-msg" id="err-zip"></span>
              </div>
            </div>
          </div>

          <div class="form-section">
            <h3>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20"/></svg>
              Kart Bilgileri
            </h3>
            <div class="form-grid">
              <div class="form-field full">
                <label>Kart Numarası <span class="req">*</span></label>
                <input type="text" id="cardNumber" name="cardNumber" placeholder="1234 5678 9012 3456" inputmode="numeric" autocomplete="cc-number">
                <span class="error-msg" id="err-cardNumber"></span>
              </div>
              <div class="form-field full">
                <label>Kart Üzerindeki İsim <span class="req">*</span></label>
                <input type="text" id="cardName" name="cardName" autocomplete="cc-name">
                <span class="error-msg" id="err-cardName"></span>
              </div>
              <div class="form-field">
                <label>Son Kul. Tarihi <span class="req">*</span></label>
                <input type="text" id="cardExpiry" name="cardExpiry" placeholder="AA/YY" inputmode="numeric" autocomplete="cc-exp">
                <span class="error-msg" id="err-cardExpiry"></span>
              </div>
              <div class="form-field">
                <label>CVV <span class="req">*</span></label>
                <input type="text" id="cardCvv" name="cardCvv" placeholder="123" inputmode="numeric" autocomplete="cc-csc">
                <span class="error-msg" id="err-cardCvv"></span>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Siparişi Tamamla
          </button>
        </form>

        <aside class="order-summary-readonly" id="mini-cart"></aside>
      </div>
    </div>
  </main>

  <div id="footer-slot"></div>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/main.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
